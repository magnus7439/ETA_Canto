
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ETA - Roteiro Musical NEW</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        /* CONFIGURAÇÃO DE FUNDO E TEXTURA */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: url('image_6.png'); /* Nome do arquivo que você subiu */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* EFEITO DE VIDRO NOS PAINÉIS */
        .glass-panel {
            background: rgba(20, 20, 20, 0.75);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        .master-player {
            position: sticky;
            top: 10px;
            width: 95%;
            max-width: 600px;
            padding: 15px;
            z-index: 100;
            text-align: center;
            margin-bottom: 20px;
        }

        #now-playing {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 1.1em;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        audio { width: 100%; border-radius: 30px; }
        #yt-player { display: none; width: 100%; aspect-ratio: 16/9; border-radius: 10px; border: none; margin-top: 15px; }

        /* LISTA MOBILE FRIENDLY */
        ul { list-style: none; padding: 0; width: 95%; max-width: 700px; }
        li { margin: 12px 0; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .li-main-row { display: grid; grid-template-columns: 35px 35px 1fr 50px; align-items: center; gap: 10px; }
        
        .drag-handle { cursor: grab; color: rgba(255,255,255,0.3); font-size: 22px; }
        input[type="checkbox"] { transform: scale(1.4); }

        .song-info { display: flex; flex-direction: column; overflow: hidden; }
        .interpreter { color: #1db954; font-weight: bold; font-size: 0.8em; text-transform: uppercase; }
        .song-title { font-size: 1.05em; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .notes-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            color: #ccc;
            font-size: 0.9em;
            padding: 8px;
            border-radius: 8px;
            min-height: 20px;
            outline: none;
        }

        .btn-play {
            background: rgba(255, 255, 255, 0.1);
            color: #1db954;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .done { opacity: 0.3; filter: grayscale(100%); }
    </style>
</head>
<body>

    <div class="master-player glass-panel">
        <div id="now-playing">Carregando planilha...</div>
        <audio id="audio-player" controls></audio>
        <iframe id="yt-player" allow="autoplay"></iframe>
    </div>

    <ul id="playlist-sortable"></ul>

    <script>
        // CONEXÃO GOOGLE SHEETS
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSYeviC8wnSv0ZYI2X5Lk5MxQIOBGA4BpNu88eSwh65EH_jPV_uNj1CF09ZFR2RLoc9n8sjKdcQA04w/pub?output=csv';

        async function carregar() {
            try {
                const r = await fetch(CSV_URL + '&t=' + new Date().getTime());
                const texto = await r.text();
                
                // Conversão de CSV para objeto
                const linhas = texto.split('\n').map(l => l.trim()).filter(l => l);
                const dados = linhas.slice(1).map(linha => {
                    const cols = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        id: cols[0]?.replace(/"/g, ''),
                        cantor: cols[1]?.replace(/"/g, ''),
                        musica: cols[2]?.replace(/"/g, ''),
                        media: cols[3]?.replace(/"/g, ''),
                        tipo: cols[4]?.replace(/"/g, ''),
                        notas: cols[5]?.replace(/"/g, '')
                    };
                }).filter(item => item.musica);

                const lista = document.getElementById('playlist-sortable');
                lista.innerHTML = '';
                document.getElementById('now-playing').innerText = "Selecione uma faixa";

                dados.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'glass-panel';
                    li.innerHTML = `
                        <div class="li-main-row">
                            <div class="drag-handle">⋮⋮</div>
                            <input type="checkbox" onchange="this.closest('li').classList.toggle('done')">
                            <div class="song-info">
                                <span class="interpreter">${item.cantor}</span>
                                <span class="song-title">${item.musica}</span>
                            </div>
                            <button class="btn-play" onclick="tocar('${item.tipo}', '${item.media}', '${item.cantor}', '${item.musica}')">▶</button>
                        </div>
                        <div class="notes-field" contenteditable="true">${item.notas || ''}</div>
                    `;
                    lista.appendChild(li);
                });

                Sortable.create(lista, { handle: '.drag-handle', animation: 150 });
            } catch (e) { 
                document.getElementById('now-playing').innerText = "Erro ao carregar planilha.";
            }
        }

        function tocar(tipo, media, cantor, musica) {
            const audio = document.getElementById('audio-player');
            const yt = document.getElementById('yt-player');
            const status = document.getElementById('now-playing');
            
            status.innerHTML = `Tocando: <b>${musica}</b><br><small>${cantor}</small>`;

            audio.pause();
            audio.src = "";
            yt.src = "";
            audio.style.display = 'none';
            yt.style.display = 'none';

            if (tipo.toLowerCase() === 'dropbox' || tipo.toLowerCase() === 'drive') {
                audio.style.display = 'block';
                audio.src = media;
                audio.load();
                audio.play().catch(e => console.log("Play manual necessário"));
            } else if (tipo.toLowerCase() === 'youtube') {
                yt.style.display = 'block';
                yt.src = `https://www.youtube.com/embed/${media}?autoplay=1`;
            }
        }

        carregar();
    </script>
</body>
</html>
