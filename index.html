<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ETA - Roteiro Musical</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        /* CONFIGURAÇÃO DE FUNDO E TEXTURA */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: url('image_6.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* EFEITO DE VIDRO NOS PAINÉIS */
        .glass-panel {
            background: rgba(20, 20, 20, 0.75);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        .master-player {
            position: sticky;
            top: 10px;
            width: 95%;
            max-width: 600px;
            padding: 15px;
            z-index: 100;
            text-align: center;
            margin-bottom: 20px;
        }

        #now-playing {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 1.1em;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        audio { width: 100%; border-radius: 30px; }
        #yt-player { display: none; width: 100%; aspect-ratio: 16/9; border-radius: 10px; border: none; margin-top: 15px; }

        /* BOTÃO DE RESET */
        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7em;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* LISTA MOBILE FRIENDLY */
        ul { list-style: none; padding: 0; width: 95%; max-width: 700px; }
        li { margin: 12px 0; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .li-main-row { display: grid; grid-template-columns: 35px 35px 1fr 50px; align-items: center; gap: 10px; }
        
        .drag-handle { cursor: grab; color: rgba(255,255,255,0.3); font-size: 22px; }
        input[type="checkbox"] { transform: scale(1.4); }

        .song-info { display: flex; flex-direction: column; overflow: hidden; }
        .interpreter { color: #1db954; font-weight: bold; font-size: 0.8em; text-transform: uppercase; }
        .song-title { font-size: 1.05em; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .notes-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            color: #ccc;
            font-size: 0.9em;
            padding: 8px;
            border-radius: 8px;
            min-height: 20px;
            outline: none;
        }

        .btn-play {
            background: rgba(255, 255, 255, 0.1);
            color: #1db954;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .done { opacity: 0.3; filter: grayscale(100%); }
    </style>
</head>
<body>

    <div class="master-player glass-panel">
        <div id="now-playing">Carregando planilha...</div>
        <audio id="audio-player" controls></audio>
        <iframe id="yt-player" allow="autoplay"></iframe>
        <button class="btn-reset" onclick="resetarOrdem()">Limpar Ordem Personalizada</button>
    </div>

    <ul id="playlist-sortable"></ul>
